version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Local development stack
# Usage: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hulm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hulm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hulm_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-hulm_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hulm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hulm_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js frontend (dev mode with hot reload) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps          # Only install deps; mount source for hot reload
    container_name: hulm_frontend
    restart: unless-stopped
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules   # Prevent host node_modules from overwriting container's
      - /app/.next          # Prevent .next from being overwritten
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Backend placeholder (Express / Node.js) ──────────────────────────────────
  # Uncomment when /backend directory is added.
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: hulm_backend
  #   restart: unless-stopped
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     - NODE_ENV=development
  #     - DATABASE_URL=postgresql://${POSTGRES_USER:-hulm}:${POSTGRES_PASSWORD:-hulm_dev_password}@postgres:5432/${POSTGRES_DB:-hulm_dev}
  #     - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
  #   env_file:
  #     - ./backend/.env.local
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
